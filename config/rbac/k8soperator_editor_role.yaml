# This rule is not used by the project k8soperator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the apps.mydomain.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: k8soperator
    app.kubernetes.io/managed-by: kustomize
  name: k8soperator-editor-role
rules:
- apiGroups:
  - apps.mydomain.com
  resources:
  - k8soperators
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps.mydomain.com
  resources:
  - k8soperators/status
  verbs:
  - get
